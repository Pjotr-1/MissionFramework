name: Build and Publish Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and LDoc
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install ldoc

      - name: Prepare docs source
        run: |
          mkdir -p build/ldoc_src
          cp -r src/*.lua build/ldoc_src/
          sed -i '/^---@/d' build/ldoc_src/*.lua
          
      - name: Generate docs
        run: |
          rm -rf docs
          mkdir -p docs
          ldoc -d docs build/ldoc_src
          ls -la docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4